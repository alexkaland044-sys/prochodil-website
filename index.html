<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prochodil Website</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

header{
    padding:80px 20px;
    background:linear-gradient(135deg,#5865F2,#2b2d31);
}

h1{
    font-size:60px;
    margin:0;
}

p{
    color:#cfcfcf;
}

.join-btn{
    display:inline-block;
    margin-top:20px;
    padding:15px 35px;
    background:#5865F2;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-size:20px;
    transition:0.3s;
}

.join-btn:hover{
    transform:scale(1.05);
    background:#4752c4;
}

.section{
    padding:60px 20px;
}

.card{
    background:#1a1a1a;
    margin:20px auto;
    padding:20px;
    max-width:700px;
    border-radius:20px;
}

footer{
    padding:30px;
    background:#111;
    color:gray;
}
</style>
</head>
<body>

<header>
    <h1>My Community</h1>
    <p>Best Discord Community</p>

    <a class="join-btn" href="https://discord.gg/jCnmtdc4SU">
        Join Discord
    </a>
</header>

<div class="section">
    <div class="card">
        <h2>About Us</h2>
        <p>Gaming, events, giveaways and community fun.</p>
    </div>

    <div class="card">
        <h2>Why Join?</h2>
        <p>Active members, custom bots, voice chats and more.</p>
    </div>

    <div class="card">
        <h2>Staff Team</h2>
        <p>Owner, Admins, Moderators</p>
    </div>
</div>

<footer>
    © 2026 My Community
</footer>

</body>
</html>
